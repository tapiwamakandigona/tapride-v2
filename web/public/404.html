<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TapRide</title>
  <script>
    // GitHub Pages SPA routing — store full URL in sessionStorage then redirect to root
    sessionStorage.setItem('spa_redirect', location.href);
    location.replace(location.protocol + '//' + location.host + '/');
  </script>
</head>
<body></body>
</html>
