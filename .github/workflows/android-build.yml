name: Android — Build APK & Release

on:
  push:
    branches: [main]
    paths: ['android/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tapride-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Get version
        id: version
        run: echo "version=1.0.$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: TapRide v${{ steps.version.outputs.version }}
          body: |
            ## TapRide Android APK
            
            Auto-built from commit ${{ github.sha }}
            
            ### Install
            1. Download `tapride-debug.apk` below
            2. Enable "Install from unknown sources" on your device
            3. Install the APK
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
